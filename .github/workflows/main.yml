name: Generate and Publish SBOM

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: ["main", "feat-pin-manifest-cli-version"]
    tags: ["v*"]

permissions:
  id-token: write
  contents: read

jobs:
  generate-and-publish-sbom:
    runs-on: windows-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: generate SBOM
        uses: manifest-cyber/manifest-github-action@feat-pin-manifest-cli-version
        with:
          apiKey: ${{ secrets.MANIFEST_API_KEY }}
          asset-labels: "github-action, production"
          generator: "cdxgen"
          verbose: "true"

  generate-and-publish-sbom-2:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: generate SBOM
        uses: manifest-cyber/manifest-github-action@feat-pin-manifest-cli-version
        with:
          apiKey: ${{ secrets.MANIFEST_API_KEY }}
          asset-labels: "github-action, production"
          generator: "cdxgen"
          verbose: "true"

  generate-and-publish-sbom-3:
    runs-on: macos-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: generate SBOM
        uses: manifest-cyber/manifest-github-action@feat-pin-manifest-cli-version
        with:
          apiKey: ${{ secrets.MANIFEST_API_KEY }}
          asset-labels: "github-action, production"
          generator: "cdxgen"
          verbose: "true"